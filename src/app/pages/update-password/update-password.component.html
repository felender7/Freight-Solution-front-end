<div class="min-h-screen bg-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex justify-center mb-2">
      <img src="assets/images/tswalanang-group-logo.png" alt="Tswalanang Group" class="h-45 w-auto object-contain">
    </div>
    
    <!-- Title -->
    <h3 class="text-center text-slate-300 text-xl font-semibold mb-8">Update Password</h3>
    
    <!-- Card -->
    <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700 shadow-2xl">
      <p class="text-center text-slate-400 text-sm mb-6">You must update your password to continue. You will be redirected to login after updating.</p>
      
      <div *ngIf="error" class="mb-5 p-3.5 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg">
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-5">
          <label class="block text-slate-300 text-sm font-medium mb-2">Current Password</label>
          <input
            type="password"
            [(ngModel)]="currentPassword"
            name="currentPassword"
            class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
            placeholder="Enter current password"
            required
          />
        </div>

        <div class="mb-5">
          <label class="block text-slate-300 text-sm font-medium mb-2">New Password</label>
          <input
            type="password"
            [(ngModel)]="newPassword"
            name="newPassword"
            class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
            placeholder="Enter new password"
            required
          />
        </div>

        <div class="mb-6">
          <label class="block text-slate-300 text-sm font-medium mb-2">Confirm New Password</label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-lg text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
            placeholder="Confirm new password"
            required
          />
        </div>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full py-3.5 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white rounded-lg font-semibold transition-all hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ loading ? 'Updating...' : 'Update Password' }}
        </button>
      </form>
    </div>
    
    <!-- Footer -->
    <p class="text-center text-slate-500 text-sm mt-6">© 2024 Tswalanang Freight. All rights reserved.</p>
  </div>
</div>
