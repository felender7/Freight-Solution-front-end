<div class="w-full px-6 mt-8">
  <!-- Header Section with Gradient Background -->
  <div class="relative bg-gradient-to-r from-slate-800 to-slate-800/50 rounded-2xl border border-slate-700/50 overflow-hidden mb-8">
    <!-- Decorative Elements -->
    <div class="absolute top-0 right-0 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl -mr-32 -mt-32"></div>
    <div class="absolute bottom-0 left-0 w-48 h-48 bg-purple-500/10 rounded-full blur-2xl -ml-24 -mb-24"></div>
    
    <div class="relative z-10 p-6">
      <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <div class="p-2 bg-blue-500/20 rounded-xl">
              <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <h1 class="text-2xl lg:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">
              HR Management
            </h1>
          </div>
          <p class="text-slate-400 ml-11">Manage your profile, attendance, performance, and learning journey</p>
        </div>
        
        <!-- Quick Stats Badges -->
        <div class="flex gap-3 ml-11 lg:ml-0">
          <div class="px-3 py-1.5 bg-emerald-500/10 rounded-lg border border-emerald-500/20">
            <span class="text-emerald-400 text-sm">✓ On Time Today</span>
          </div>
          <div class="px-3 py-1.5 bg-blue-500/10 rounded-lg border border-blue-500/20">
            <span class="text-blue-400 text-sm">📚 3 Courses</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Enhanced Navigation Tabs -->
    <div class="relative z-10 px-6 border-t border-slate-700/50">
      <div class="flex overflow-x-auto scrollbar-hide gap-1 py-3">
        <!-- Dashboard Tab -->
        <a routerLink="dashboard" 
           routerLinkActive="active-tab" 
           [routerLinkActiveOptions]="{exact: true}" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            <span>Dashboard</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>

        <!-- Profile Tab -->
        <a routerLink="profile" 
           routerLinkActive="active-tab" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span>Profile</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>

        <!-- Attendance Tab -->
        <a routerLink="attendance" 
           routerLinkActive="active-tab" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Attendance</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>

        <!-- Performance Tab -->
        <a routerLink="performance" 
           routerLinkActive="active-tab" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            <span>Performance</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>

        <!-- Leave Tab -->
        <a routerLink="leave" 
           routerLinkActive="active-tab" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span>Leave</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>

        <!-- Timesheets Tab -->
        <a routerLink="timesheets" 
           routerLinkActive="active-tab" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <span>Timesheets</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>

        <!-- Tasks Tab -->
        <a routerLink="tasks" 
           routerLinkActive="active-tab" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            <span>Tasks</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>

        <!-- LMS Tab -->
        <a routerLink="lms" 
           routerLinkActive="active-tab" 
           class="tab-item group relative px-5 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-200 transition-all duration-200 whitespace-nowrap">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
            <span>LMS</span>
          </div>
          <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full opacity-0 group-[.active-tab]:opacity-100 transition-opacity"></div>
        </a>
      </div>
    </div>
  </div>

  <!-- Content Area with Animation -->
  <div class="animate-fade-in">
    <router-outlet></router-outlet>
  </div>
</div>
